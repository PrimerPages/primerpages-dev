# Workflow for updating demo sites
name: Sync templates

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - 'templates/**'
  workflow_call:
    secrets:
      PR_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run the workflow without creating PRs"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  DRY_RUN: ${{ inputs.dry-run || 'false' }}

jobs:
  sync-demos:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - template_name: "primerpages-gh-pages"
            repo: PrimerPages/primerpages-gh-pages
            branch: main
          - template_name: "primerpages-minimal"
            repo: PrimerPages/primerpages-minimal
            branch: main
          - template_name: "primerpages-recommended"
            repo: PrimerPages/primerpages-recommended
            branch: main
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # To grab the log message

      - name: Get commit message
        id: commit-msg
        run: |
          COMMIT_MSG="$(git log -1 --pretty=format:%s)"
          echo "commit-msg=${COMMIT_MSG//$'\n'/ }" >> "$GITHUB_OUTPUT"

      - name: Checkout target repo for ${{ matrix.target.template_name }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.target.repo }}
          ref: ${{ matrix.target.branch }}
          token: ${{ secrets.PR_TOKEN }}
          path: ${{ matrix.target.template_name }}

      - name: Sync template content
        run: |
          TEMPLATE_NAME=${{ matrix.target.template_name }}
          # Sync files
          rsync -av --delete --exclude=".git/" "templates/$TEMPLATE_NAME/" "$TEMPLATE_NAME/"

      - name: Create sync pull request
        id: create-pr
        if: ${{ env.DRY_RUN != 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PR_TOKEN }}
          path: ${{ matrix.target.template_name }}
          commit-message: "[sync] ${{ steps.commit-msg.outputs.commit-msg }}"
          committer: Github Actions <actions@github.com>
          author: Github Actions <actions@github.com>
          branch: "sync/template-${{ matrix.target.template_name }}"
          base: ${{ matrix.target.branch }}
          title: "[sync] ${{ steps.commit-msg.outputs.commit-msg }}"
          body: |
            Automated sync from `PrimerPages/primerpages-dev`.

            Source paths:
            - `templates/${{ matrix.target.template_name }}/`

      - name: Summary
        if: always()
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            PULL_REQUEST="not created (dry run)"
          elif [[ -n "$PR_URL" ]]; then
            PULL_REQUEST="[#$PR_NUMBER]($PR_URL)"
          else
            PULL_REQUEST="none (no file changes to sync)"
          fi

          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Sync Template Summary
          - Template: \`${{ matrix.target.template_name }}\`
          - Target repository: \`${{ matrix.target.repo }}\`
          - Dry run: \`${DRY_RUN}\`
          - Pull request: $PULL_REQUEST
          EOF
        env:
          DRY_RUN: ${{ env.DRY_RUN }}
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
