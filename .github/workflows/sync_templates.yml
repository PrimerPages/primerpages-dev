# Workflow for updating demo sites
name: Sync templates

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  workflow_call:
    secrets:
      PR_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run the workflow without pushing commits"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  DRY_RUN: ${{ inputs.dry-run || 'false' }}

jobs:
  sync-demos:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - template_name: "primerpages-gh-pages"
            repo: PrimerPages/primerpages-gh-pages
            branch: main
          - template_name: "primerpages-minimal"
            repo: PrimerPages/primerpages-minimal
            branch: main
          - template_name: "primerpages-recommended"
            repo: PrimerPages/primerpages-recommended
            branch: main
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # To grab the log message

      - name: Get commit message
        id: commit-msg
        run: |
          COMMIT_MSG="$(git log -1 --pretty=format:%s)"
          echo "commit-msg=${COMMIT_MSG//$'\n'/ }" >> "$GITHUB_OUTPUT"

      - name: Checkout target repo for ${{ matrix.target.template_name }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.target.repo }}
          ref: ${{ matrix.target.branch }}
          token: ${{ secrets.PR_TOKEN }}
          path: ${{ matrix.target.template_name }}

      - name: Sync template content
        run: |
          TEMPLATE_NAME=${{ matrix.target.template_name }}
          # Sync files
          rsync -av --delete --exclude=".git/" "templates/$TEMPLATE_NAME/" "$TEMPLATE_NAME/"

      - name: Commit and push sync changes
        id: sync-push
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          COMMIT_MSG: ${{ steps.commit-msg.outputs.commit-msg }}
        run: |
          set -euo pipefail
          cd "${{ matrix.target.template_name }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          git commit -m "[sync] ${COMMIT_MSG}" \
            -m "Source: PrimerPages/primerpages-dev@${GITHUB_SHA}" \
            -m "Source path: templates/${{ matrix.target.template_name }}/"
          git push origin "HEAD:${{ matrix.target.branch }}"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for site.yml workflow status
        id: commit-status
        if: ${{ env.DRY_RUN != 'true' && steps.sync-push.outputs.pushed == 'true' }}
        uses: ./.github/actions/wait-for-workflow-status
        with:
          token: ${{ secrets.PR_TOKEN }}
          repo: ${{ matrix.target.repo }}
          workflow: site.yml
          commit_sha: ${{ steps.sync-push.outputs.commit_sha }}

      - name: Summary
        if: always()
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            RESULT="not pushed (dry run)"
          elif [[ "$SYNC_PUSHED" == "true" ]]; then
            RESULT="[$SYNC_COMMIT_SHA](https://github.com/${TARGET_REPO}/commit/${SYNC_COMMIT_SHA})"
          else
            RESULT="none (no file changes to sync)"
          fi

          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Sync Template Summary
          - Template: \`${{ matrix.target.template_name }}\`
          - Target repository: \`${TARGET_REPO}\`
          - Dry run: \`${DRY_RUN}\`
          - Commit: $RESULT
          - Commit status: \`${COMMIT_STATUS}\`
          EOF
        env:
          DRY_RUN: ${{ env.DRY_RUN }}
          TARGET_REPO: ${{ matrix.target.repo }}
          SYNC_PUSHED: ${{ steps.sync-push.outputs.pushed }}
          SYNC_COMMIT_SHA: ${{ steps.sync-push.outputs.commit_sha }}
          COMMIT_STATUS: ${{ steps.commit-status.outputs.status || 'not checked' }}
