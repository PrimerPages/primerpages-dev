name: Bump version

on:
  # Run on every pull request
  pull_request:
    types: [opened, reopened, synchronize]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write


jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
            fetch-depth: 0
            fetch-tags: true

      - name: Resolve version metadata
        id: version
        uses: athackst/ci/actions/version-resolver@main
        with:
          gh-token: ${{ github.token }}

      - name: Bump theme version
        run: |
          version="${{ steps.version.outputs.resolved-version }}"
          file="theme/VERSION"
          echo "Preparing release for version $version in $file"
          .github/bump.sh --file "$file" "$version"

      - name: Get commit message
        id: commit-msg
        run: |
          COMMIT_MSG="Bump version to ${{ steps.version.outputs.resolved-version }}"
          echo "commit-msg=${COMMIT_MSG//$'\n'/ }" >> "$GITHUB_OUTPUT"

      - name: Commit updated files
        id: commit
        shell: bash
        env:
            COMMIT_MSG: ${{ steps.commit-msg.outputs.commit-msg }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Bump script produced no changes."
            echo "changed=false" | tee -a "$GITHUB_OUTPUT"
            {
              echo "changed-files<<EOF"
              echo ""
              echo "EOF"
            } | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          CHANGED_FILES="$(git diff --cached --name-only)"

          {
            echo "changed=true"
            echo "changed-files<<EOF"
            printf '%s\n' "$CHANGED_FILES"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "$COMMIT_MSG"

      - name: Push commit
        id: bump-commit
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        env:
          PUSH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          if [ -z "$TARGET_BRANCH" ] || [ "$TARGET_BRANCH" = "HEAD" ]; then
            echo "Unable to resolve a valid target branch for commit push."
            exit 1
          fi
          echo "target-branch=$TARGET_BRANCH" | tee -a "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
          else
            echo "Remote branch ${TARGET_BRANCH} does not exist yet; pushing current HEAD to create it."
          fi
          git push origin "HEAD:refs/heads/${TARGET_BRANCH}"

      - name: Build PR bump comment body
        id: bump-comment
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        shell: bash
        env:
          TARGET_BRANCH: ${{ steps.bump-commit.outputs.target-branch || '' }}
          VERSION: ${{ steps.version.outputs.resolved-version || '' }}
          CHANGED_FILES: ${{ steps.commit.outputs.changed-files || '' }}
          MARKER: "<!-- ci:pr-bump -->"
        run: |
          set -euo pipefail
          {
            echo "marker=$MARKER"
            echo "body<<EOF"
            echo "$MARKER"
            printf '%s' "Applied automated version bump commit"
            if [ -n "${VERSION}" ]; then
              printf " for \`%s\`" "${VERSION}"
            fi
            if [ -n "${TARGET_BRANCH}" ]; then
              printf " on branch \`%s\`" "${TARGET_BRANCH}"
            fi
            echo "."
            if [ -n "${CHANGED_FILES}" ]; then
              echo
              echo "Changed files:"
              echo '```text'
              printf '%s\n' "${CHANGED_FILES}"
              echo '```'
            fi
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Find existing PR bump comment
        id: find-bump-comment
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        uses: peter-evans/find-comment@v4
        with:
          token: ${{ github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: ${{ steps.bump-comment.outputs.marker }}

      - name: Create or update PR bump comment
        if: ${{ github.event_name == 'pull_request' && steps.commit.outputs.changed == 'true' }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-bump-comment.outputs.comment-id }}
          body: ${{ steps.bump-comment.outputs.body }}
          edit-mode: replace

      - name: Workflow summary
        if: ${{ always() }}
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          CHANGED: ${{ steps.commit.outputs.changed || 'false' }}
          TARGET_BRANCH: ${{ steps.bump-commit.outputs.target-branch || '' }}
          CHANGED_FILES: ${{ steps.commit.outputs.changed-files || '' }}
          FROM_REF: ${{ steps.version.outputs.from-ref }}
          VERSION: ${{ steps.version.outputs.resolved-version }}
          MAJOR_VERSION: ${{ steps.version.outputs.major-version }}
          MINOR_VERSION: ${{ steps.version.outputs.minor-version }}
          PATCH_VERSION: ${{ steps.version.outputs.patch-version }}
        run: |
          set -euo pipefail

          {
            echo "### PR Bump"
            echo ""

            if [ -n "${VERSION}" ]; then
              echo "from-ref: \`${FROM_REF}\`"
              echo "target-branch: \`${TARGET_BRANCH}\`"
              echo "resolved-version: \`${VERSION}\`"
              echo "version-parts: \`${MAJOR_VERSION}.${MINOR_VERSION}.${PATCH_VERSION}\`"
              if [ -n "${CHANGED_FILES}" ]; then
                echo ""
                echo "changed-files:"
                echo '```text'
                printf '%s\n' "${CHANGED_FILES}"
                echo '```'
              fi
            else
              echo ":grey_question: Version metadata was not resolved."
            fi

            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
