name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish or test (for example, 1.13.0)"
        required: true
        type: string
      dry-run:
        description: "Build and validate without publishing or tagging"
        required: false
        default: true
        type: boolean
      tag-downstream:
        description: "Tag downstream repositories after publishing"
        required: false
        default: false
        type: boolean

jobs:
  build-gem:
    name: Build gem
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.305.0

      - name: Check release version matches
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          VERSION="$(cat theme/VERSION)"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          if [ "$VERSION" != "$RELEASE_VERSION" ]; then
            echo "Version from file: $VERSION"
            echo "Version from release: $RELEASE_VERSION"
            echo "Versions do not match!"
            exit 1
          fi

      - name: Build gem
        working-directory: theme
        run: |
          mkdir -p pkg
          gem build jekyll-theme-profile.gemspec --output "pkg/jekyll-theme-profile-$(cat VERSION).gem"

      - name: Upload built gem artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: built-gem
          path: theme/pkg/*.gem
          if-no-files-found: error
          retention-days: 7

  publish-gem:
    name: Publish gem
    needs: [build-gem]
    runs-on: ubuntu-latest
    environment: release-gem
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.305.0

      - name: Download built gem artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: built-gem
          path: theme/pkg

      - name: Configure RubyGems credentials
        if: ${{ github.event_name == 'release' || !inputs.dry-run }}
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Validate gem artifact
        if: ${{ inputs.dry-run }}
        working-directory: theme
        run: gem specification pkg/*.gem name

      - name: Publish gem
        if: ${{ github.event_name == 'release' || !inputs.dry-run }}
        working-directory: theme
        run: gem push pkg/*.gem

      - name: Upload gem to GitHub release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" theme/pkg/*.gem --repo "$GITHUB_REPOSITORY" --clobber

  tag-downstream-repos:
    name: Tag downstream repositories
    needs: [build-gem, publish-gem]
    if: ${{ always() && needs.build-gem.result == 'success' && needs.publish-gem.result == 'success' && (github.event_name == 'release' || (inputs.tag-downstream && !inputs.dry-run)) }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - repo: PrimerPages/primerpages-gh-pages
            branch: main
            path: primerpages-gh-pages
          - repo: PrimerPages/primerpages-minimal
            branch: main
            path: primerpages-minimal
          - repo: PrimerPages/primerpages-recommended
            branch: main
            path: primerpages-recommended
          - repo: PrimerPages/jekyll-theme-profile
            branch: main
            path: jekyll-theme-profile
          - repo: PrimerPages/primerpages.github.io
            branch: main
            path: primerpages.github.io

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.target.repo }}
          ref: ${{ matrix.target.branch }}
          token: ${{ secrets.PR_TOKEN }}
          path: ${{ matrix.target.path }}
          fetch-depth: 0

      - name: Create and push release tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name || inputs.version }}"
          TARGET_BRANCH="${{ matrix.target.branch }}"
          TARGET_PATH="${{ matrix.target.path }}"

          cd "$TARGET_PATH"
          git fetch --tags origin "$TARGET_BRANCH"
          git checkout --detach "origin/$TARGET_BRANCH"

          if git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            echo "Tag $TAG_NAME already exists in ${{ matrix.target.repo }}. Skipping."
            exit 0
          fi

          git config user.name "Github Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "refs/tags/$TAG_NAME"
