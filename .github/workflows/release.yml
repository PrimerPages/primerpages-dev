name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish or test (for example, 1.13.0)"
        required: true
        type: string
      dry-run:
        description: "Build and validate without publishing or tagging"
        required: false
        default: true
        type: boolean
      tag-downstream:
        description: "Tag downstream repositories after publishing"
        required: false
        default: false
        type: boolean

jobs:
  build-gem:
    name: Build gem
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.305.0

      - name: Check release version matches
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          VERSION="$(cat theme/VERSION)"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          if [ "$VERSION" != "$RELEASE_VERSION" ]; then
            echo "Version from file: $VERSION"
            echo "Version from release: $RELEASE_VERSION"
            echo "Versions do not match!"
            exit 1
          fi

      - name: Build gem
        working-directory: theme
        run: |
          mkdir -p pkg
          gem build jekyll-theme-profile.gemspec --output "pkg/jekyll-theme-profile-$(cat VERSION).gem"

      - name: Upload built gem artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: built-gem
          path: theme/pkg/*.gem
          if-no-files-found: error
          retention-days: 7

  publish-gem:
    name: Publish gem
    needs: [build-gem]
    runs-on: ubuntu-latest
    environment: release-gem
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.305.0

      - name: Download built gem artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: built-gem
          path: theme/pkg

      - name: Configure RubyGems credentials
        if: ${{ github.event_name == 'release' || !inputs.dry-run }}
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Validate gem artifact
        if: ${{ inputs.dry-run }}
        working-directory: theme
        run: gem specification pkg/*.gem name

      - name: Publish gem
        if: ${{ github.event_name == 'release' || !inputs.dry-run }}
        working-directory: theme
        run: gem push pkg/*.gem

  update-downstream-repos:
    name: Tag downstream repositories
    needs: [build-gem, publish-gem]
    if: ${{ always() && needs.build-gem.result == 'success' && needs.publish-gem.result == 'success' && (github.event_name == 'release' || (inputs.tag-downstream && !inputs.dry-run)) }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - repo: PrimerPages/primerpages-gh-pages
            branch: main
            path: primerpages-gh-pages
          - repo: PrimerPages/primerpages-minimal
            branch: main
            path: primerpages-minimal
          - repo: PrimerPages/primerpages-recommended
            branch: main
            path: primerpages-recommended
          - repo: PrimerPages/jekyll-theme-profile
            branch: main
            path: jekyll-theme-profile
          - repo: PrimerPages/primerpages.github.io
            branch: main
            path: primerpages.github.io

    steps:
      - name: Download built gem artifact
        if: ${{ matrix.target.repo == 'PrimerPages/jekyll-theme-profile' }}
        uses: actions/download-artifact@v8.0.1
        with:
          name: built-gem
          path: built-gem

      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.target.repo }}
          ref: ${{ matrix.target.branch }}
          token: ${{ secrets.PR_TOKEN }}
          path: ${{ matrix.target.path }}
          fetch-depth: 0

      - name: Create downstream release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          TARGET_REPO: ${{ matrix.target.repo }}
          TARGET_BRANCH: ${{ matrix.target.branch }}
        run: |
          set -euo pipefail

          NOTES_FILE="$(mktemp)"
          if [[ -n "${RELEASE_BODY:-}" ]]; then
            printf '%s\n' "$RELEASE_BODY" > "$NOTES_FILE"
          else
            printf 'Release %s\n\nPublished from PrimerPages/primerpages-dev.\n' "$RELEASE_TAG" > "$NOTES_FILE"
          fi

          RELEASE_TITLE="${RELEASE_NAME:-Release ${RELEASE_TAG}}"

          if gh release view "$RELEASE_TAG" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$TARGET_REPO" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$TARGET_REPO" \
              --target "$TARGET_BRANCH" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE"
          fi

      - name: Upload gem asset to downstream theme release
        if: ${{ matrix.target.repo == 'PrimerPages/jekyll-theme-profile' }}
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
          TARGET_REPO: ${{ matrix.target.repo }}
        run: |
          gh release upload "$RELEASE_TAG" built-gem/*.gem \
            --repo "$TARGET_REPO" \
            --clobber

      - name: Dispatch rebuild event
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}
          TARGET_REPO: ${{matrix.target.repo }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail

          if [[ "${DRY_RUN}" == "true" && "${GITHUB_EVENT_NAME}" != "release" ]]; then
            echo "Dry run enabled; skipping repository_dispatch for ${TARGET_REPO}."
            exit 0
          fi

          gh api "repos/${TARGET_REPO}/dispatches" \
            --method POST \
            -f "event_type=theme-release" \
            -f "client_payload[source_repo]=PrimerPages/primerpages-dev" \
            -f "client_payload[release_tag]=${RELEASE_TAG}" \
            -f "client_payload[source_sha]=${GITHUB_SHA}"
