name: Release artifacts

on:
  release:
    types: [published]

jobs:
  publish-gem:
    uses: ./.github/workflows/gem.yml
    with:
      version: ${{ github.event.release.tag_name }}
    secrets: inherit

  tag-downstream-repos:
    name: Tag downstream repositories
    needs: [publish-gem]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - repo: PrimerPages/primerpages-gh-pages
            branch: main
            path: primerpages-gh-pages
          - repo: PrimerPages/primerpages-minimal
            branch: main
            path: primerpages-minimal
          - repo: PrimerPages/primerpages-recommended
            branch: main
            path: primerpages-recommended
          - repo: PrimerPages/jekyll-theme-profile
            branch: main
            path: jekyll-theme-profile
          - repo: PrimerPages/primerpages.github.io
            branch: main
            path: primerpages.github.io

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.target.repo }}
          ref: ${{ matrix.target.branch }}
          token: ${{ secrets.PR_TOKEN }}
          path: ${{ matrix.target.path }}
          fetch-depth: 0

      - name: Create and push release tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          TARGET_PATH="${{ matrix.target.path }}"

          cd "$TARGET_PATH"
          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            echo "Tag $TAG_NAME already exists in ${{ matrix.target.repo }}. Skipping."
            exit 0
          fi

          git config user.name "Github Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "refs/tags/$TAG_NAME"
