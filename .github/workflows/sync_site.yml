name: Sync site repo

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
  workflow_call:
    secrets:
      PR_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run the workflow without pushing commits"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  DRY_RUN: ${{ inputs.dry-run || 'false' }}

jobs:
  sync-site:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: "PrimerPages/primerpages.github.io"
      TARGET_PATH: "primerpages.github.io"
      TARGET_BRANCH: "main"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get commit message
        id: commit-msg
        run: |
          COMMIT_MSG="$(git log -1 --pretty=format:%s)"
          echo "commit-msg=${COMMIT_MSG//$'\n'/ }" >> "$GITHUB_OUTPUT"

      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.PR_TOKEN }}
          path: ${{ env.TARGET_PATH }}

      - name: Sync site directory
        run: |
          rsync -av --delete --exclude=".git/" site/ "$TARGET_PATH/"

      - name: Commit and push sync changes
        id: sync-push
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        env:
          COMMIT_MSG: ${{ steps.commit-msg.outputs.commit-msg }}
        run: |
          set -euo pipefail
          cd "$TARGET_PATH"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          git commit -m "[sync] ${COMMIT_MSG}" \
            -m "Source: PrimerPages/primerpages-dev@${GITHUB_SHA}" \
            -m "Source path: site/"
          git push origin "HEAD:${TARGET_BRANCH}"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dispatch downstream rebuild
        if: ${{ env.DRY_RUN != 'true' && steps.sync-push.outputs.pushed != 'true'}}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PR_TOKEN }}
          TARGET_REPO: ${{ env.TARGET_REPO }}
        run: |
          set -euo pipefail
          gh api "repos/${TARGET_REPO}/dispatches" \
            --method POST \
            -f "event_type=force-rebuild" \
            -f "client_payload[source_repo]=PrimerPages/primerpages-dev" \
            -f "client_payload[source_sha]=${GITHUB_SHA}" \
            -f "client_payload[sync_commit_sha]=${{ steps.sync-push.outputs.commit_sha }}"

      - name: Wait for site.yml workflow status
        id: commit-status
        if: ${{ env.DRY_RUN != 'true' }}
        uses: ./.github/actions/wait-for-workflow-status
        with:
          token: ${{ secrets.PR_TOKEN }}
          repo: ${{ env.TARGET_REPO }}
          workflow: site.yml
          commit_sha: ${{ steps.sync-push.outputs.commit_sha }}

      - name: Summary
        if: always()
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            RESULT="not pushed (dry run)"
          elif [[ "$SYNC_PUSHED" == "true" ]]; then
            RESULT="[$SYNC_COMMIT_SHA](https://github.com/${TARGET_REPO}/commit/${SYNC_COMMIT_SHA})"
          else
            RESULT="none (no file changes to sync)"
          fi

          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Sync Site Summary
          - Target repository: \`${TARGET_REPO}\`
          - Dry run: \`${DRY_RUN}\`
          - Commit: $RESULT
          - Commit status: \`${COMMIT_STATUS}\`
          EOF
        env:
          DRY_RUN: ${{ env.DRY_RUN }}
          SYNC_PUSHED: ${{ steps.sync-push.outputs.pushed }}
          SYNC_COMMIT_SHA: ${{ steps.sync-push.outputs.commit_sha }}
          COMMIT_STATUS: ${{ steps.commit-status.outputs.status || 'not checked' }}
