version: 2
updates:
- package-ecosystem: github-actions
  directories: 
    - "/"
    - "templates/*/.github/workflows/"
    - "site/.github/workflows/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
- package-ecosystem: bundler
  directories: 
    - "/"
    - "templates/*/"
    - "site/"
    - "theme/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
